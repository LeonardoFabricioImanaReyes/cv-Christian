<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Piloto Comercial</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#edf2f7;
            padding:40px;
        }

        .container{
            max-width:1200px;
            margin:auto;
        }

        .header{
            background:#0b2545;
            color:white;
            display:flex;
            align-items:center;
            gap:30px;
            padding:40px;
            border-radius:15px;
            margin-bottom:25px;
        }

        .foto img{
            width:180px;
            height:180px;
            border-radius:50%;
            border:5px solid white;
            object-fit:cover;
        }

        .info h1{
            font-size:42px;
        }

        .info h2{
            color:#b4c8dd;
            margin-bottom:15px;
        }

        .card{
            background:white;
            padding:25px;
            margin-bottom:20px;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
        }

        .card h3{
            color:#0b2545;
            margin-bottom:15px;
            border-left:5px solid #1b6ca8;
            padding-left:10px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:15px;
        }

        .item{
            background:#f5f8fb;
            padding:20px;
            border-radius:10px;
            text-align:center;
        }

        .item h4{
            color:#1b6ca8;
            margin-bottom:10px;
        }

        .experiencia{
            margin-bottom:20px;
        }

        .experiencia h4{
            color:#0b2545;
        }

        .experiencia span{
            color:gray;
            font-size:14px;
        }

        ul{
            margin-left:20px;
            margin-top:10px;
        }

        li{
            margin-bottom:8px;
        }

    </style>

</head>

<body>

<div class="container">

    <header class="header">

    <div class="foto">
        <img>
    </div>

    <div class="info">
        <h1>CAP. CHRISTIAN IMAÑA</h1>
        <h2>Piloto Comercial de Aerolínea</h2>

        <p>📍 La Paz, Bolivia</p>
        <p>📞 <a href="tel:+59172055184">+591 72055184</a></p>
        <p>✉ <a href="mailto:lchristian.imana.r@gmail.com">lchristian.imana.r@gmail.com</a></p>
        <p>🌐 <a href="https://www.linkedin.com/in/christian-andres-i-39992a338?utm_source=share_via&utm_content=profile&utm_medium=member_ios">linkedin.com/in/christianimana</a></p>
    </div>

</header>
 
</div>

</body>
</html>
